# Local Development Configuration with H2 Database
# To use this profile, run: mvn spring-boot:run -Dspring.profiles.active=local
# Or set environment variable: SPRING_PROFILES_ACTIVE=local

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-face-attendance-backend
  
  # H2 Database Configuration for local development
  datasource:
    url: jdbc:h2:mem:facetrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  # JPA/Hibernate Configuration for H2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          lob:
            non_contextual_creation: true
    database-platform: org.hibernate.dialect.H2Dialect
    
  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console
      
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      enabled: true
      
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
  expiration: ${JWT_EXPIRATION:86400000}
  
# Face Recognition Configuration
face:
  recognition:
    confidence-threshold: 0.6
    max-images-per-student: 5
    storage-bucket: face-images
    
# File Storage Configuration
file:
  upload:
    dir: ${FILE_UPLOAD_DIR:./uploads/}
    
# Logging Configuration
logging:
  level:
    com.faceattendance: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/face-attendance.log

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      
# CORS Configuration
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
