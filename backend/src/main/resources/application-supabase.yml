# Supabase Production Configuration
# To use this profile, run: mvn spring-boot:run -Dspring.profiles.active=supabase
# Or set environment variable: SPRING_PROFILES_ACTIVE=supabase

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-face-attendance-backend
  
  # Supabase PostgreSQL Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:${SUPABASE_DB_URL}}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_DB_USERNAME}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_DB_PASSWORD}}
    driver-class-name: org.postgresql.Driver
    
  # JPA/Hibernate Configuration for PostgreSQL
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          lob:
            non_contextual_creation: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      enabled: true
      
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
  expiration: ${JWT_EXPIRATION:86400000}
  
# Supabase Configuration
supabase:
  url: ${SUPABASE_URL:https://mvgqvrlohtzklbtquumw.supabase.co}
  anon-key: ${SUPABASE_ANON_KEY:your-anon-key}
  service-key: ${SUPABASE_SERVICE_KEY:your-service-role-key}
  
# Face Recognition Configuration
face:
  recognition:
    confidence-threshold: 0.6
    max-images-per-student: 5
    storage-bucket: face-images
    
# File Storage Configuration
file:
  upload:
    dir: ${FILE_UPLOAD_DIR:./uploads/}
    
# Logging Configuration
logging:
  level:
    com.faceattendance: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/face-attendance.log

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      
# CORS Configuration
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
